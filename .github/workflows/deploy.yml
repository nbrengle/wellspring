# CI + deploy. The `build` job (test + Vite build) runs on every PR and on push
# to main — it's the required status check for branch protection. The `deploy`
# job publishes dist/ to GitHub Pages, but ONLY on push to main (never on a PR),
# so PRs are verified without deploying. No gh-pages branch or extra dependency.
name: Deploy to GitHub Pages

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    # Only publish from main — PRs run `build` for verification but never deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
